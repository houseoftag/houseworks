name: houseworks

services:
  postgres:
    image: postgres:16-alpine
    container_name: houseworks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: houseworks
    ports:
      - "5432:5432"
    volumes:
      - houseworks-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d houseworks"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: houseworks-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - houseworks-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  houseworks-postgres-data:
  houseworks-redis-data:
